<!DOCTYPE html>
<html>
<head>
    <title>Nouikat-3D</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin: 20px;
        }

        .product {
            background: #1a1a1a;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
        }

        img {
            width: 90%;
            max-width: 300px;
            border-radius: 10px;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            background: #ff4d4d;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff1a1a;
        }
    </style>
</head>

<body>

    <h1>🔥 Meine Produkte 🔥</h1>

    <!-- PRODUKT 1 -->
    <div class="product">
        <h2>Beton Mini Car</h2>

        <img src="https://via.placeholder.com/300" alt="Produkt">

        <p>Handgemacht. Minimalistisch. Perfekt für dein Setup.</p>

        <button onclick="window.open('https://www.willhaben.at/DEIN-LINK')">
            Auf Willhaben ansehen
        </button>
    </div>

    <!-- PRODUKT 2 -->
    <div class="product">
        <h2>Special Edition</h2>

        <img src="https://via.placeholder.com/300" alt="Produkt">

        <p>Limitierte Version – nur wenige verfügbar.</p>

        <button onclick="window.open('https://www.willhaben.at/DEIN-LINK')">
            Jetzt kaufen
        </button>
    </div>

</body>
</html>
